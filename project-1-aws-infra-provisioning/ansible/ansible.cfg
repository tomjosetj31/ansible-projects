[defaults]
# Path to the dynamic inventory: EC2 instances are discovered via the aws_ec2 plugin.
inventory = inventories/dev/aws_ec2.yml
# Skip SSH host key verification (avoids "Are you sure you want to continue connecting?" prompts).
host_key_checking = False
# Do not create .retry files when a play fails (cleaner workspace, use logs instead).
retry_files_enabled = False
# Use the target host's Python (auto-detect); "silent" avoids warnings when Python is found.
interpreter_python = auto_silent
# Print task output as YAML instead of the default one-line-per-task format.
stdout_callback = yaml
# Run on up to 20 hosts in parallel (higher concurrency for large inventories).
forks = 20

[inventory]
# Use the amazon.aws.aws_ec2 plugin to build inventory from AWS EC2 (tags, regions, etc.).
enable_plugins = amazon.aws.aws_ec2
