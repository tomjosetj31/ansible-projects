app_name: myapp

# ECR
aws_region: ap-south-1
ecr_registry: "123456789012.dkr.ecr.ap-south-1.amazonaws.com"
ecr_repo: "myapp"

# Image tag should come from CI (git sha). You can also pass it via -e image_tag=...
image_tag: "latest"
image_full: "{{ ecr_registry }}/{{ ecr_repo }}:{{ image_tag }}"

# Container
container_name: "{{ app_name }}"
container_port: 8000         # app container listens on this
host_port: 8000              # host binds to this
health_url: "http://127.0.0.1:{{ host_port }}/health"

# Optional: Nginx as reverse proxy on port 80 -> 8000
use_nginx: true
nginx_server_name: "_"

# Optional: ALB draining
use_alb_draining: false
alb_target_group_arn: ""      # fill if you want ALB draining
alb_port: 80                  # target group port (often 80)