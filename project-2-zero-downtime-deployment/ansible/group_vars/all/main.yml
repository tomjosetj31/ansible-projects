app_name: myapp
app_user: ubuntu
app_group: ubuntu

app_repo: "https://github.com/your-username/your-repo.git"
app_release_dir: "/opt/{{ app_name }}/releases"
app_current_path: "{{ app_release_dir }}/current"
app_shared_dir: "{{ app_release_dir }}/shared"
app_env_file: "{{ app_shared_dir }}/.env"

# This version should be set by CI ideally (git sha/tag). We'll default to timestamp for now.
app_version: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"

app_listen_host: "127.0.0.1"
app_listen_port: 8000
app_health_url: "http://{{ app_listen_host }}:{{ app_listen_port }}/health"

# Nginx
nginx_server_name: "_" # later set to  domain